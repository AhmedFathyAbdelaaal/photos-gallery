services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "file:/data/db/captionato.db"
      UPLOAD_DIR: "/data/uploads"
      SITE_PASSWORD: "${SITE_PASSWORD}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
    volumes:
      - captionato_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/auth"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  captionato_data:
    driver: local
